<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}App{% endblock %}</title>
</head>
<body>
    {% if session.get("username") %}
        <nav>
            <a href="/dashboard">Dashboard</a> |
            <a href="/profile/{{ session['username'] }}">Profil</a> |
            <a href="/logout">Logout</a>
        </nav>
        <hr>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
