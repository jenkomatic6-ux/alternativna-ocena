{% extends "base.html" %}

{% block title %}Reset gesla{% endblock %}

{% block content %}
<h2>Ponastavi geslo</h2>

<form method="POST" action="/reset_password">
    <input type="text" name="username" placeholder="Username" required>
    <br><br>
    <input type="password" name="new_password" placeholder="Novo geslo" required>
    <br><br>
    <button type="submit">Spremeni geslo</button>
</form>

<br>
<a href="/login">Nazaj na login</a>
{% endblock %}
