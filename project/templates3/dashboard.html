<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <title>PASSWORDs</title>
    </head>
    <body>
        <h2>Hello! {{user}}</h2>

        <form method="post" action="/dashboard">
            <input type="number" name="length" placeholder="Password length">
            <button type="submit">GENERATE!!!</button><br>

            <input type="checkbox" id="obcija1" name="obcija1" value="1">
            <label for="obcija1">Words</label><br>

            <input type="checkbox" id="obcija2" name="obcija2" value="2">
            <label for="obcija2">Numbers</label><br>

            <input type="checkbox" id="obcija3" name="obcija3" value="3">
            <label for="obcija3">Signs</label><br>
        </form>

        {% if password %}
            <p>Generated password: <b>{{password}}</b></p>
        {% endif %}

        <a href="/logout">Logout</a>
    </body>
</html>
