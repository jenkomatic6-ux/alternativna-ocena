<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Username" required>

        <br><br>
        <button type="submit">Prijavi se</button>
    </form>

    <br>
    <a href="/register">Še nimaš računa?</a>
    <br>
    <a href="/dashboard">Nazaj na dashboard</a>
</body>
</html>
